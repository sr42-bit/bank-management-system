spring:
  application:
    name: core-banking-engine

  datasource:
    url: jdbc:mysql://mysql:3306/corebank
    username: bankuser
    password: bankpass
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect

server:
  port: 8080
